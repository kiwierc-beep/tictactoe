<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe with AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .cell { transition: all 0.2s ease-in-out; }
        .cell:hover:not(.occupied) { background-color: #f1f5f9; cursor: pointer; }
        .cell.occupied { cursor: default; }
        .ai-thinking .cell:hover:not(.occupied) { background-color: white; cursor: wait; }
        .pop-in { animation: popIn 0.3s forwards; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .win-line { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { background-color: #dcfce7; } 50% { background-color: #bbf7d0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-800 py-8">
    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-md w-full mx-4 flex flex-col items-center">
        <h1 class="text-3xl font-bold mb-4 text-slate-900">Tic-Tac-Toe</h1>
        
        <div class="w-full mb-5">
            <label class="block text-sm font-medium text-slate-600 mb-1">Game Mode:</label>
            <select id="gameMode" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none cursor-pointer">
                <option value="pvp">Player vs Player</option>
                <option value="ai-easy">Player vs AI (Easy)</option>
                <option value="ai-hard" selected>Player vs AI (Unbeatable)</option>
            </select>
        </div>

        <div class="w-full grid grid-cols-3 gap-2 mb-6 text-center">
            <div class="bg-blue-50 rounded-lg p-2 border border-blue-100">
                <div class="text-xs font-semibold text-blue-600 uppercase">Player X</div>
                <div id="scoreX" class="text-2xl font-bold text-blue-700">0</div>
            </div>
            <div class="bg-slate-50 rounded-lg p-2 border border-slate-200">
                <div class="text-xs font-semibold text-slate-500 uppercase">Draws</div>
                <div id="scoreDraws" class="text-2xl font-bold text-slate-700">0</div>
            </div>
            <div class="bg-rose-50 rounded-lg p-2 border border-rose-100">
                <div class="text-xs font-semibold text-rose-600 uppercase" id="playerOLabel">AI (O)</div>
                <div id="scoreO" class="text-2xl font-bold text-rose-700">0</div>
            </div>
        </div>

        <div id="status" class="text-lg font-medium text-slate-500 mb-6 h-8 flex items-center justify-center">
            Player <span class="mx-1 font-bold text-blue-500">X</span>'s Turn
        </div>

        <div id="board" class="grid grid-cols-3 gap-3 mb-8 bg-slate-200 p-3 rounded-xl w-full max-w-[300px]">
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="0"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="1"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="2"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="3"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="4"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="5"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="6"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="7"></div>
            <div class="cell bg-white w-full aspect-square rounded-lg flex items-center justify-center text-5xl font-bold shadow-sm" data-index="8"></div>
        </div>

        <div class="w-full flex gap-3">
            <button id="resetScoresBtn" class="flex-1 py-3 px-4 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-lg font-semibold transition-colors duration-200">Reset Scores</button>
            <button id="restartBtn" class="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-semibold transition-colors duration-200 shadow-md">Next Round</button>
        </div>
    </div>

    <script>
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let isAITurn = false;
        let scores = { X: 0, O: 0, draws: 0 };

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const statusDisplay = document.getElementById('status');
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const gameModeSelect = document.getElementById('gameMode');
        
        const turnMessage = () => isAITurn ? `<span class="text-slate-500">AI is thinking...</span>` : `Player <span class="mx-1 font-bold ${currentPlayer === 'X' ? 'text-blue-500' : 'text-rose-500'}">${currentPlayer}</span>'s Turn`;
        const winMessage = () => `Player <span class="mx-1 font-bold ${currentPlayer === 'X' ? 'text-blue-500' : 'text-rose-500'}">${currentPlayer}</span> Wins! 🏆`;
        const drawMessage = () => `<span class="font-bold text-slate-700">It's a Draw! 🤝</span>`;

        function initGame() {
            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('resetScoresBtn').addEventListener('click', () => { scores = { X: 0, O: 0, draws: 0 }; updateScoreBoard(); });
            gameModeSelect.addEventListener('change', () => { document.getElementById('playerOLabel').innerText = gameModeSelect.value === 'pvp' ? 'Player O' : 'AI (O)'; scores = { X: 0, O: 0, draws: 0 }; updateScoreBoard(); restartGame(); });
            updateStatus();
        }

        function handleCellClick(e) {
            const index = parseInt(e.target.getAttribute('data-index'));
            if (boardState[index] !== '' || !gameActive || isAITurn) return;
            processMove(index);
            if (gameActive && gameModeSelect.value !== 'pvp') {
                isAITurn = true; boardElement.classList.add('ai-thinking'); updateStatus();
                setTimeout(makeAIMove, 500);
            }
        }

        function processMove(index) {
            boardState[index] = currentPlayer;
            const symbol = document.createElement('span');
            symbol.textContent = currentPlayer;
            symbol.classList.add('pop-in', currentPlayer === 'X' ? 'text-blue-500' : 'text-rose-500');
            cells[index].appendChild(symbol);
            cells[index].classList.add('occupied');
            checkResult();
        }

        function checkResult() {
            let roundWon = false; let winningCells = [];
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true; winningCells = winningConditions[i]; break;
                }
            }
            if (roundWon) {
                statusDisplay.innerHTML = winMessage(); gameActive = false;
                winningCells.forEach(i => cells[i].classList.add('win-line'));
                scores[currentPlayer]++; updateScoreBoard(); return;
            }
            if (!boardState.includes('')) {
                statusDisplay.innerHTML = drawMessage(); gameActive = false;
                scores.draws++; updateScoreBoard(); return;
            }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X'; updateStatus();
        }

        function makeAIMove() {
            const mode = gameModeSelect.value;
            let move = mode === 'ai-easy' ? getRandomMove() : getMinimaxMove();
            if (move !== undefined) processMove(move);
            isAITurn = false; boardElement.classList.remove('ai-thinking'); updateStatus();
        }

        function getRandomMove() {
            const empty = boardState.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            return empty.length ? empty[Math.floor(Math.random() * empty.length)] : undefined;
        }

        function getMinimaxMove() {
            let bestScore = -Infinity; let move;
            for (let i = 0; i < boardState.length; i++) {
                if (boardState[i] === '') {
                    boardState[i] = 'O';
                    let score = minimax(boardState, 0, false);
                    boardState[i] = '';
                    if (score > bestScore) { bestScore = score; move = i; }
                }
            }
            return move;
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkWinnerForMinimax();
            if (result === 'O') return 10 - depth;
            if (result === 'X') return depth - 10;
            if (result === 'tie') return 0;
            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') { board[i] = 'O'; bestScore = Math.max(minimax(board, depth + 1, false), bestScore); board[i] = ''; }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') { board[i] = 'X'; bestScore = Math.min(minimax(board, depth + 1, true), bestScore); board[i] = ''; }
                }
                return bestScore;
            }
        }

        function checkWinnerForMinimax() {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) return boardState[a];
            }
            return boardState.includes('') ? null : 'tie';
        }

        function updateScoreBoard() {
            document.getElementById('scoreX').innerText = scores.X;
            document.getElementById('scoreO').innerText = scores.O;
            document.getElementById('scoreDraws').innerText = scores.draws;
        }
        
        function updateStatus() { if (gameActive) statusDisplay.innerHTML = turnMessage(); }
        
        function restartGame() {
            boardState = ['', '', '', '', '', '', '', '', '']; gameActive = true; currentPlayer = 'X'; isAITurn = false;
            boardElement.classList.remove('ai-thinking'); updateStatus();
            cells.forEach(c => { c.innerHTML = ''; c.classList.remove('occupied', 'win-line'); });
        }

        window.onload = initGame;
    </script>
</body>
</html>
